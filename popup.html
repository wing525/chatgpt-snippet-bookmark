<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Snippet Bookmarks</title>
    <style>
      body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; margin: 0; width: 360px; }
      .wrap { padding: 12px; }
      .row { display: flex; gap: 8px; margin-bottom: 10px; }
      input { flex: 1; padding: 8px; border: 1px solid #ddd; border-radius: 8px; }
      .hint { color: #666; font-size: 12px; margin-bottom: 8px; }
      .item { border: 1px solid #eee; border-radius: 10px; padding: 10px; margin-bottom: 8px; }
      .meta { color: #777; font-size: 11px; margin-top: 6px; display: flex; justify-content: space-between; gap: 8px; }
      .text { white-space: pre-wrap; font-size: 13px; line-height: 1.35; }
      .actions { display: flex; gap: 8px; margin-top: 8px; }
      button { border: 1px solid #ddd; background: #fff; border-radius: 8px; padding: 5px 8px; cursor: pointer; font-size: 12px; }
      button:hover { background: #f7f7f7; }
      .empty { color: #777; text-align: center; padding: 20px 8px; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="row">
        <input id="q" placeholder="Search text / title / tags" />
        <button id="export">Export MD</button>
      </div>
      <div class="hint">Tip: On ChatGPT page, select assistant text then press ⌘/Ctrl+Shift+S or right click to save.</div>
      <div id="list"></div>
    </div>
    <script src="popup.js"></script>
  </body>
</html>
